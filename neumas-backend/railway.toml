[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
dockerBuildTarget = "worker"

[deploy]
# Railway's `neumas-worker` service is currently attached to this manifest.
# Use the dedicated worker image target and entrypoint here.
startCommand = "./start_worker.sh"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
