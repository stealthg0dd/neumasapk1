name: Security Scan

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  npm-audit:
    name: npm audit (neumas-web)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: neumas-web/package-lock.json

      - name: Install dependencies
        working-directory: neumas-web
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        id: audit
        working-directory: neumas-web
        # Fail the step if any HIGH or CRITICAL vulnerabilities are found
        run: npm audit --audit-level=high --json > /tmp/audit-report.json; echo "exit_code=$?" >> $GITHUB_OUTPUT || true
        continue-on-error: true

      - name: Parse audit results
        id: parse
        run: |
          if [ -f /tmp/audit-report.json ]; then
            HIGH=$(jq '.metadata.vulnerabilities.high // 0' /tmp/audit-report.json)
            CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' /tmp/audit-report.json)
            echo "high=$HIGH" >> $GITHUB_OUTPUT
            echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
            echo "High: $HIGH, Critical: $CRITICAL"
          else
            echo "high=0" >> $GITHUB_OUTPUT
            echo "critical=0" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub issue for npm vulnerabilities
        if: ${{ steps.parse.outputs.high > 0 || steps.parse.outputs.critical > 0 }}
        uses: actions/github-script@v7
        with:
          script: |
            const high = ${{ steps.parse.outputs.high }};
            const critical = ${{ steps.parse.outputs.critical }};
            const body = [
              '## npm Audit Security Alert',
              '',
              `**Scan date:** ${new Date().toISOString().slice(0, 10)}`,
              `**High severity:** ${high}`,
              `**Critical severity:** ${critical}`,
              '',
              'Run `npm audit --audit-level=high` in `neumas-web/` for details.',
              'Fix with `npm audit fix` or review the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for the full JSON report.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] npm ${critical > 0 ? 'CRITICAL' : 'HIGH'} vulnerabilities detected (${new Date().toISOString().slice(0, 10)})`,
              body,
              labels: ['security', 'dependencies'],
            });

      - name: Notify npm vulnerabilities — #neumas-dev
        if: ${{ steps.parse.outputs.high > 0 || steps.parse.outputs.critical > 0 }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_NEUMAS_DEV }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":warning: *npm security vulnerabilities found in neumas-web*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":warning: *npm audit: vulnerabilities detected*\n*High:* ${{ steps.parse.outputs.high }}  |  *Critical:* ${{ steps.parse.outputs.critical }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View report>"
                  }
                }
              ]
            }

  trivy-scan:
    name: Trivy container scan (neumas-web)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for scanning
        working-directory: neumas-web
        run: docker build -t neumas-web:scan --target runner .

      - name: Run Trivy vulnerability scan
        id: trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "neumas-web:scan"
          format: "json"
          output: "/tmp/trivy-report.json"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"

      - name: Parse Trivy results
        id: trivy-parse
        run: |
          if [ -f /tmp/trivy-report.json ]; then
            COUNT=$(jq '[.Results[]?.Vulnerabilities // [] | .[] | select(.Severity == "HIGH" or .Severity == "CRITICAL")] | length' /tmp/trivy-report.json 2>/dev/null || echo 0)
            echo "vuln_count=$COUNT" >> $GITHUB_OUTPUT
            echo "Vulnerabilities found: $COUNT"
          else
            echo "vuln_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub issue for container vulnerabilities
        if: ${{ steps.trivy-parse.outputs.vuln_count > 0 }}
        uses: actions/github-script@v7
        with:
          script: |
            const count = ${{ steps.trivy-parse.outputs.vuln_count }};
            const body = [
              '## Trivy Container Security Alert',
              '',
              `**Scan date:** ${new Date().toISOString().slice(0, 10)}`,
              `**Image scanned:** \`neumas-web:scan\``,
              `**HIGH/CRITICAL vulnerabilities:** ${count}`,
              '',
              'See the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for the full Trivy JSON report.',
              '',
              'Remediation options:',
              '- Update the base image in `neumas-web/Dockerfile` (`node:20-alpine` → latest patch)',
              '- Update affected OS packages or library dependencies',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Trivy: ${count} HIGH/CRITICAL container vulnerabilities (${new Date().toISOString().slice(0, 10)})`,
              body,
              labels: ['security', 'docker'],
            });

      - name: Notify Trivy vulnerabilities — #neumas-dev
        if: ${{ steps.trivy-parse.outputs.vuln_count > 0 }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_NEUMAS_DEV }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":shield: *Trivy container vulnerabilities found in neumas-web*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":shield: *Trivy scan: HIGH/CRITICAL container vulnerabilities*\n*Count:* ${{ steps.trivy-parse.outputs.vuln_count }}\n*Image:* `neumas-web:scan`\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View report>"
                  }
                }
              ]
            }

  python-safety:
    name: Python dependency safety (neumas-backend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: neumas-backend/pyproject.toml

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        id: pip-audit
        working-directory: neumas-backend
        run: |
          pip install -e ".[dev]" --quiet 2>/dev/null || pip install -e "." --quiet
          pip-audit --format=json --output=/tmp/pip-audit.json || true

      - name: Parse pip-audit results
        id: pip-parse
        run: |
          if [ -f /tmp/pip-audit.json ]; then
            COUNT=$(jq '[.[] | select(.vulns | length > 0)] | length' /tmp/pip-audit.json 2>/dev/null || echo 0)
            echo "vuln_count=$COUNT" >> $GITHUB_OUTPUT
            echo "Vulnerable packages: $COUNT"
          else
            echo "vuln_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub issue for Python vulnerabilities
        if: ${{ steps.pip-parse.outputs.vuln_count > 0 }}
        uses: actions/github-script@v7
        with:
          script: |
            const count = ${{ steps.pip-parse.outputs.vuln_count }};
            const body = [
              '## Python Dependency Security Alert',
              '',
              `**Scan date:** ${new Date().toISOString().slice(0, 10)}`,
              `**Vulnerable packages:** ${count}`,
              '',
              'See the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for the full pip-audit JSON report.',
              'Update affected packages in `neumas-backend/pyproject.toml`.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] pip-audit: ${count} vulnerable Python packages (${new Date().toISOString().slice(0, 10)})`,
              body,
              labels: ['security', 'dependencies'],
            });

      - name: Notify Python vulnerabilities — #neumas-dev
        if: ${{ steps.pip-parse.outputs.vuln_count > 0 }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_NEUMAS_DEV }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":snake: *Python dependency vulnerabilities found in neumas-backend*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":snake: *pip-audit: vulnerable Python packages*\n*Count:* ${{ steps.pip-parse.outputs.vuln_count }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View report>"
                  }
                }
              ]
            }
