# Deploy neumas-web to Vercel (production).
#
# Railway does NOT trigger Vercel. Pushing to Git deploys Railway services from
# their own GitHub integration; this workflow is what updates the Vercel project
# via the Vercel CLI (requires repo secrets below). Alternatively you can connect
# the same GitHub repo in the Vercel dashboard (root: neumas-web) — then disable
# this workflow or keep one path only to avoid double deploys.
#
# Required GitHub Actions secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_NEUMAS
# See .github/SECRETS.md

name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "neumas-web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:
    inputs:
      skip_ci_wait:
        description: "Skip waiting for the CI web job (only if CI already passed for this commit)"
        required: false
        default: false
        type: boolean

# Only one deploy runs at a time. A new push cancels a queued but
# not-yet-started deploy; an in-progress deploy always finishes.
concurrency:
  group: deploy-web
  cancel-in-progress: false

permissions:
  contents: read
  checks: read

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production

    outputs:
      deploy_url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Require Vercel GitHub secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_NEUMAS }}
        run: |
          missing=()
          [ -z "$VERCEL_TOKEN" ] && missing+=("VERCEL_TOKEN")
          [ -z "$VERCEL_ORG_ID" ] && missing+=("VERCEL_ORG_ID")
          [ -z "$VERCEL_PROJECT_ID" ] && missing+=("VERCEL_PROJECT_ID_NEUMAS")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing GitHub Actions secrets: ${missing[*]}. Railway deploys do not trigger Vercel. Add them under Settings → Secrets and variables → Actions. See .github/SECRETS.md"
            exit 1
          fi

      - name: Wait for CI web build to pass
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_ci_wait != 'true')
        uses: lewagon/wait-on-check-action@v1.6.1
        with:
          ref: ${{ github.sha }}
          check-name: "Web — build & type-check"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success
          running-workflow-name: Deploy Web
          checks-discovery-timeout: 300

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: neumas-web/pnpm-lock.yaml

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        id: deploy
        working-directory: neumas-web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_NEUMAS }}
          NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}
        run: |
          URL=$(vercel deploy --prod --token=$VERCEL_TOKEN --yes 2>&1 | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"

      - name: Verify /api/health
        if: steps.deploy.outputs.url != ''
        env:
          NEUMAS_VERCEL_URL: ${{ secrets.NEUMAS_VERCEL_URL }}
        run: |
          # Use the stable production alias — unique deployment URLs have Vercel protection enabled
          HEALTH_URL="${NEUMAS_VERCEL_URL:-${{ steps.deploy.outputs.url }}}/api/health"
          echo "Checking $HEALTH_URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Create Sentry release
        if: steps.deploy.outputs.url != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_NEUMAS_WEB }}
        run: |
          npx @sentry/cli releases new "${{ github.sha }}"
          npx @sentry/cli releases set-commits "${{ github.sha }}" --auto
          npx @sentry/cli releases deploys "${{ github.sha }}" new \
            --env production \
            --url "${{ steps.deploy.outputs.url }}"
          npx @sentry/cli releases finalize "${{ github.sha }}"

      - name: Register heartbeat with agent OS
        env:
          AGENT_OS_URL: ${{ secrets.AGENT_OS_URL }}
          AGENT_OS_API_KEY: ${{ secrets.AGENT_OS_API_KEY }}
        run: |
          curl -s -f -X POST "$AGENT_OS_URL/api/heartbeat/neumas-web" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $AGENT_OS_API_KEY" \
            -d '{
              "status": "ok",
              "uptime_seconds": 0,
              "active_connections": 0,
              "memory_mb": 0,
              "version": "${{ github.sha }}"
            }' || echo "Heartbeat failed (non-fatal)"

      - name: Notify success — #neumas-alerts
        if: steps.deploy.outputs.url != ''
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_NEUMAS_ALERTS }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":rocket: *neumas-web deployed* to production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":rocket: *neumas-web deployed to production*\n*URL:* ${{ steps.deploy.outputs.url }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>\n*By:* ${{ github.actor }}"
                  }
                }
              ]
            }

      - name: Notify success — #ctech-command
        if: steps.deploy.outputs.url != ''
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_CTECH_COMMAND }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: neumas-web production deploy complete — ${{ steps.deploy.outputs.url }}"
            }

  notify-failure:
    name: Notify deploy failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - name: Post failure — #neumas-alerts
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_NEUMAS_ALERTS }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":fire: *neumas-web deploy FAILED*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":fire: *neumas-web deploy FAILED*\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>\n*By:* ${{ github.actor }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }

      - name: Post failure — #ctech-command
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_CTECH_COMMAND }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":fire: neumas-web deploy FAILED — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
