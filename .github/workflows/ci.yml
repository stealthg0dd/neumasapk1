name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which directories changed so we can skip irrelevant jobs
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'neumas-web/**'
              - '.github/workflows/ci.yml'
            backend:
              - 'neumas-backend/**'
              - '.github/workflows/ci.yml'

  # ---------------------------------------------------------------------------
  # neumas-web — TypeScript type-check + Next.js build + optional tests
  # ---------------------------------------------------------------------------
  web:
    name: Web — build & type-check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    defaults:
      run:
        working-directory: neumas-web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: neumas-web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Next.js build
        env:
          # Provide stub values so the build completes without real secrets.
          # These are NOT used at runtime.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_SENTRY_DSN: ""
          SENTRY_DSN: ""
          NEXT_PUBLIC_ENVIRONMENT: ci
          NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}
          # Skip Sentry source-map upload during CI build (no auth token needed)
          SENTRY_AUTH_TOKEN: ""
        run: npm run build

      - name: Run tests
        # Only run if a test script exists and there are test files
        if: hashFiles('neumas-web/**/*.test.*', 'neumas-web/**/*.spec.*') != ''
        run: npm test --if-present

  # ---------------------------------------------------------------------------
  # neumas-backend — lint + pytest
  # ---------------------------------------------------------------------------
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: neumas-backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: neumas-backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        env:
          ENV: test
          DEBUG: "true"
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-key
          JWT_SECRET_KEY: test-secret-key-for-testing-only
          REDIS_URL: redis://localhost:6379/0
          CELERY_TASK_ALWAYS_EAGER: "true"
        run: pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Notify Slack on failure
  # ---------------------------------------------------------------------------
  notify-failure:
    name: Notify Slack on failure
    runs-on: ubuntu-latest
    needs: [web, backend]
    if: failure()
    steps:
      - name: Post failure to Slack #neumas-dev
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_NEUMAS_DEV }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *CI failed* on `${{ github.repository }}`",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *CI failed* — `${{ github.ref_name }}`\n*Triggered by:* ${{ github.actor }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }
